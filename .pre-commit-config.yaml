repos:
  - repo: local
    hooks:
      - id: php-cs-fixer
        name: PHP CS Fixer
        language: system
        entry: docker compose exec -T php-fpm vendor/bin/php-cs-fixer fix --config=.php-cs-fixer.php
        types: [php]
        pass_filenames: false

      - id: phpstan
        name: PHPStan
        language: system
        entry: docker compose exec -T php-fpm vendor/bin/phpstan analyse --no-progress
        types: [php]
        pass_filenames: false

      - id: rector
        name: Rector (check-only)
        language: system
        entry: docker compose exec -T php-fpm vendor/bin/rector process --dry-run --no-progress-bar
        types: [php]
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: [--branch, main]
