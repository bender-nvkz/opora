# Опора — Docker Compose dev-окружение
# Запуск: docker compose up -d
# Остановка: docker compose down
# Сброс данных: docker compose down -v

name: opora

services:
  # ─────────────────────────────────────────
  # PHP-FPM 8.4 (application server)
  # ─────────────────────────────────────────
  php-fpm:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: opora-php-fpm
    restart: unless-stopped
    volumes:
      - .:/app:cached
      - opora_composer_cache:/root/.composer/cache
    environment:
      APP_ENV: dev
      APP_DEBUG: "true"
      DB_DSN: "pgsql:host=postgres;port=5432;dbname=opora"
      DB_USERNAME: opora
      DB_PASSWORD: opora_dev_password
      DB_DATABASE: opora
      QUEUE_DSN: "pgsql:host=postgres;port=5432;dbname=opora"
      CACHE_DIR: /app/runtime/cache
      LOG_DIR: /app/runtime/logs
      APP_SECRET: dev-secret-change-in-production-32chars
    networks:
      - opora_internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "echo 'ok';"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────
  # nginx (web server / reverse proxy)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:1.27.3-alpine
    container_name: opora-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/app/public:ro
    networks:
      - opora_internal
    depends_on:
      - php-fpm
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────
  # PostgreSQL 16 (primary database)
  # ─────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: opora-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: opora
      POSTGRES_PASSWORD: opora_dev_password
      POSTGRES_DB: opora
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - opora_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - opora_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opora -d opora"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────
  # pgAdmin 4 (database GUI — только dev)
  # ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: opora-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@opora.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - opora_pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - opora_internal
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

  # ─────────────────────────────────────────
  # Mailpit (почтовый перехватчик — только dev)
  # ─────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:v1.21.6
    container_name: opora-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    networks:
      - opora_internal
    profiles:
      - tools

networks:
  opora_internal:
    driver: bridge
    name: opora_network

volumes:
  opora_postgres_data:
    name: opora_postgres_data
  opora_pgadmin_data:
    name: opora_pgadmin_data
  opora_composer_cache:
    name: opora_composer_cache
